!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paddle App</title>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-QXEKGF4DXT"></script>

  function gtag(){dataLayer.push(arguments);}

  gtag('config', 'G-QXEKGF4DXT');

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans+Condensed:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --ink: #0a0b0d;
  --ink2: #13151a;
  --ink3: #1d2028;
  --line: rgba(255,255,255,0.07);
  --line2: rgba(255,255,255,0.13);
  --line3: rgba(255,255,255,0.22);
  --dim: #4a4f5e;
  --mid: #8a909f;
  --text: #c8cdd8;
  --bright: #e8ecf4;
  --amber: #f5a623;
  --amber-dim: rgba(245,166,35,0.12);
  --green: #3dd68c;
  --green-dim: rgba(61,214,140,0.1);
  --blue: #4d9fff;
  --blue-dim: rgba(77,159,255,0.1);
  --red: #ff6b6b;
  --red-dim: rgba(255,107,107,0.1);
  --violet: #a78bfa;
  --violet-dim: rgba(167,139,250,0.1);
  --sans: 'IBM Plex Sans Condensed', sans-serif;
  --mono: 'IBM Plex Mono', monospace;
  --card-w: 340px;
}

html { font-size: 16px; }
body {
  background: var(--ink);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content:'';
  position:fixed;inset:0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
  pointer-events:none;z-index:1000;
}

header {
  background: var(--ink2);
  border-bottom: 1px solid var(--line2);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 16px;
  height: auto;
  position: sticky;
  top: 0;
  z-index: 200;
  justify-content: space-between;
}

.hd-depot {
  display:flex;align-items:center;gap:12px;
  flex: 0 0 auto;
}

.hd-dot {
  width:8px;height:8px;border-radius:50%;
  background:var(--amber);
  opacity: 0.7;
  animation: pulse 2.5s ease-in-out infinite;
}

@keyframes pulse { 0%,100%{opacity:.5} 50%{opacity:.3} }

.hd-depot-select {
  font-family:var(--mono);
  font-size:15px;
  background:none;border:none;
  color:var(--bright);
  padding:0;
  cursor:pointer;
  font-weight:600;
  letter-spacing:.04em;
}

.hd-depot-select:hover {
  color:var(--amber);
}

.hd-pick {
  font-size:12px;
  color:var(--dim);
  margin-top:2px;
}

.btn-live {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 600;
  background: var(--red);
  color: var(--bright);
  border: none;
  padding: 8px 16px;
  border-radius: 4px;
  cursor: pointer;
  text-decoration: none;
  transition: all .15s;
  letter-spacing: .04em;
  flex: 0 0 auto;
}

.btn-live:hover {
  background: #ff5252;
  transform: translateY(-1px);
}

.toolbar {
  background:var(--ink2);
  border-bottom:1px solid var(--line);
  padding:14px;
  display:flex;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
}

.day-selector {
  display: flex;
  gap: 8px;
  flex: 1 1 auto;
  min-width: 250px;
  flex-wrap: wrap;
}

.day-btn {
  background:var(--ink3);
  color:var(--mid);
  font-family:var(--mono);
  font-size:13px;
  font-weight: 600;
  padding:10px 16px;
  border-radius:4px;
  cursor:pointer;
  transition:all .15s;
  white-space:nowrap;
  border: none;
}

.day-btn:hover {
  color:var(--text);
  background: var(--ink2);
}

.day-btn.sunday { color: var(--green); }
.day-btn.weekday { color: var(--amber); }
.day-btn.saturday { color: var(--blue); }

.day-btn.active.sunday { background: var(--green-dim); color: var(--green); }
.day-btn.active.weekday { background: var(--amber-dim); color: var(--amber); }
.day-btn.active.saturday { background: var(--blue-dim); color: var(--blue); }

.search-row {
  display: flex;
  gap: 8px;
  flex: 1 1 auto;
  min-width: 280px;
}

.search-wrap {
  position:relative;
  flex: 1 1 auto;
  min-width: 100px;
}

.search-wrap svg {
  position:absolute;
  left:9px;
  top:50%;
  transform:translateY(-50%);
  color:var(--dim);
  pointer-events:none;
}

.search-wrap input {
  width:100%;
  background:var(--ink3);
  border:1px solid var(--line2);
  color:var(--bright);
  font-family:var(--mono);
  font-size:14px;
  padding:10px 10px 10px 30px;
  border-radius:4px;
  outline:none;
  transition:border-color .15s;
}

.search-wrap input:focus{border-color:var(--amber);}
.search-wrap input::placeholder{color:var(--dim);}

.filter-row {
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  flex: 1 1 auto;
}

.fchip {
  background:var(--ink3);
  border:1px solid var(--line2);
  color:var(--mid);
  font-family:var(--mono);
  font-size:12px;
  padding:7px 12px;
  border-radius:3px;
  cursor:pointer;
  transition:all .15s;
  white-space:nowrap;
}

.fchip:hover{border-color:var(--line3);color:var(--text);}
.fchip.active{background:var(--amber-dim);border-color:var(--amber);color:var(--amber);}

.sort-sel {
  background:var(--ink3);
  border:1px solid var(--line2);
  color:var(--text);
  font-family:var(--mono);
  font-size:13px;
  padding:8px 10px;
  border-radius:4px;
  outline:none;
  cursor:pointer;
}

.result-line {
  font-size:13px;
  color:var(--dim);
  font-family:var(--mono);
  white-space:nowrap;
  flex: 0 0 auto;
}

.result-line strong { color:var(--amber); }

.grid-wrap {
  padding: 16px 12px 40px;
}

.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(min(var(--card-w), 100%), 1fr));
  gap: 12px;
}

.card {
  background:var(--ink2);
  border:1px solid var(--line2);
  border-radius:6px;
  overflow:hidden;
  transition:border-color .2s, transform .15s;
  position:relative;
}

.card:hover {
  border-color:var(--line3);
  transform:translateY(-1px);
}

.card::before {
  content:'';
  position:absolute;
  left:0;
  top:0;
  bottom:0;
  width:4px;
}

.card.day-Sunday::before { background:var(--green); }
.card.day-Weekday::before { background:var(--amber); }
.card.day-Saturday::before { background:var(--blue); }

.card-head {
  display: grid;
  grid-template-rows: auto auto;
  gap: 0;
  border-bottom:1px solid var(--line);
  background:var(--ink3);
}

.card-head-top {
  display: flex;
  align-items: center;
  justify-content: flex-start;
  padding: 6px 12px;
  gap: 8px;
  border-bottom: 1px solid var(--line);
}

.run-day {
  font-size:11px;
  font-weight:600;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:var(--amber);
  flex-shrink: 0;
}

.card.day-Sunday .run-day { color:var(--green); }
.card.day-Weekday .run-day { color:var(--amber); }
.card.day-Saturday .run-day { color:var(--blue); }

.run-num-label {
  font-family:var(--mono);
  font-size:11px;
  font-weight:600;
  color:var(--bright);
  flex-shrink: 0;
  display: none;
}

.run-num {
  font-family:var(--mono);
  font-size:16px;
  font-weight:700;
  color:var(--amber);
  line-height:1;
  flex-shrink: 0;
}

.card.day-Sunday .run-num { color:var(--green); }
.card.day-Weekday .run-num { color:var(--amber); }
.card.day-Saturday .run-num { color:var(--blue); }

.run-actions {
  margin-left: auto;
}

.btn-paddle {
  font-family:var(--mono);
  font-size:9px;
  background:none;
  border:1px solid var(--line2);
  color:var(--mid);
  padding:3px 6px;
  border-radius:3px;
  cursor:pointer;
  text-decoration:none;
  display:none;
  align-items:center;
  gap:3px;
  transition:all .15s;
  white-space:nowrap;
  flex-shrink: 0;
}

.btn-paddle.show {
  display: inline-flex;
}

.btn-paddle:hover{
  border-color:var(--amber);
  color:var(--amber);
  background:var(--amber-dim);
}

.card-head-bottom {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding: 6px 12px;
}

.run-routes {
  font-family:var(--mono);
  font-size:11px;
  font-weight:600;
  color:var(--bright);
  letter-spacing:.01em;
  overflow: hidden;
  text-overflow: ellipsis;
}

.stats-row {
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  border-bottom:1px solid var(--line);
}

.stat {
  padding:10px 12px;
  border-right:1px solid var(--line);
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
}

.stat:last-child{border-right:none;}

.stat-label {
  font-size:10px;
  font-weight:600;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:var(--dim);
  margin-bottom:3px;
}

.stat-val {
  font-family:var(--mono);
  font-size:16px;
  font-weight:700;
  color:var(--bright);
  line-height: 1.1;
}

.stat-val.pay { color:var(--amber); }

.swing-section {
  padding:6px 12px;
  border-top:1px solid var(--line);
  background:var(--ink3);
  font-family:var(--mono);
  font-size:10px;
  color:var(--mid);
  display: flex;
  justify-content: flex-start;
  gap: 2px;
}

.swing-label {
  color:var(--dim);
  font-weight: 600;
}

.swing-value {
  color:var(--violet);
  font-weight: 600;
}

.timeline {
  padding:12px 14px 12px 17px;
}

.seg {
  display:flex;
  align-items:stretch;
  gap:0;
  margin-bottom:6px;
  position:relative;
}

.seg:last-child{ margin-bottom:0; }

.seg-connector {
  width:16px;
  flex-shrink:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  position:relative;
  margin-right:8px;
}

.seg-dot {
  width:8px;
  height:8px;
  border-radius:50%;
  border:2px solid;
  flex-shrink:0;
  margin-top:4px;
  z-index:1;
  border-color:var(--green);
  background:var(--green);
}

.seg-line {
  width:1px;
  background:var(--line2);
  flex:1;
  margin-top:2px;
}

.seg:last-child .seg-line { display:none; }

.seg-body {
  flex:1;
  min-width:0;
  padding-bottom:6px;
}

.seg-top {
  display:flex;
  align-items:baseline;
  gap:6px;
  margin-bottom:3px;
  flex-wrap: wrap;
}

.seg-route {
  font-family:var(--mono);
  font-size:14px;
  font-weight:600;
  color:var(--bright);
  min-width:36px;
}

.seg-block {
  font-family:var(--mono);
  font-size:11px;
  color:var(--dim);
}

.seg-sched {
  font-family:var(--mono);
  font-size:11px;
  color:var(--mid);
  margin-left:auto;
}

.seg-times {
  display:flex;
  align-items:center;
  gap:4px;
  font-family:var(--mono);
  font-size:12px;
  color:var(--mid);
  flex-wrap: wrap;
}

.seg-time-tag {
  font-size:10px;
  font-weight:600;
  letter-spacing:.05em;
  padding:1px 4px;
  border-radius:2px;
  background:var(--green-dim);
  color:var(--green);
}

.seg-arrow { color:var(--dim);font-size:10px; }

.empty {
  grid-column:1/-1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:280px;
  gap:12px;
  color:var(--dim);
}

.empty p { font-size:16px; }

#route-filters {
  display:flex;
  flex-wrap:wrap;
  gap:4px;
  min-width: 200px;
}

.error {
  background: var(--red-dim);
  border: 1px solid var(--red);
  color: var(--red);
  padding: 20px;
  border-radius: 4px;
  margin: 20px;
  font-family: var(--mono);
  font-size: 14px;
}

@media (max-width: 768px) {
  body {
    background:
      radial-gradient(circle at top left, rgba(255, 225, 163, 0.32), transparent 28%),
      linear-gradient(180deg, #f8f2e7 0%, #f3ecdf 100%);
    color: #2d3440;
  }

  body::before {
    background:
      linear-gradient(180deg, rgba(255,255,255,0.45), rgba(255,255,255,0.1)),
      repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(80, 55, 25, 0.025) 3px, rgba(80, 55, 25, 0.025) 6px);
    z-index: 0;
  }

  header,
  .toolbar {
    position: relative;
    z-index: 1;
    background: rgba(255, 251, 244, 0.92);
    backdrop-filter: blur(12px);
    border-color: rgba(97, 78, 43, 0.14);
    box-shadow: 0 10px 24px rgba(68, 46, 11, 0.08);
  }

  header {
    padding: 14px 14px 12px;
    align-items: flex-start;
    gap: 12px;
  }

  .hd-depot-select {
    color: #1d2a3a;
    font-size: 16px;
  }

  .hd-pick {
    color: #6d7784;
    font-size: 12px;
  }

  .btn-live {
    background: linear-gradient(135deg, #ff7a59, #ff5d6c);
    color: #fffaf5;
    padding: 10px 14px;
    font-size: 12px;
    border-radius: 999px;
    box-shadow: 0 8px 18px rgba(255, 93, 108, 0.22);
  }

  .grid-wrap {
    padding: 14px 10px 28px;
    position: relative;
    z-index: 1;
  }

  .toolbar {
    flex-direction: column;
    gap: 12px;
    padding: 12px 10px 14px;
  }

  .day-selector,
  .search-row,
  .filter-row,
  .sort-sel,
  .result-line,
  #route-filters {
    width: 100%;
    min-width: unset;
  }

  .day-selector {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 8px;
  }

  .day-btn {
    min-width: 0;
    padding: 12px 8px;
    font-size: 12px;
    border-radius: 12px;
    background: #ffffff;
    color: #526173;
    border: 1px solid rgba(70, 84, 104, 0.12);
    box-shadow: 0 4px 14px rgba(43, 52, 65, 0.06);
  }

  .day-btn:hover {
    background: #ffffff;
    color: #2d3440;
  }

  .day-btn.active.sunday {
    background: #e7f8ee;
    color: #1d8d54;
    border-color: rgba(29, 141, 84, 0.24);
  }

  .day-btn.active.weekday {
    background: #fff0d6;
    color: #bd6f00;
    border-color: rgba(189, 111, 0, 0.24);
  }

  .day-btn.active.saturday {
    background: #e8f2ff;
    color: #2c72d6;
    border-color: rgba(44, 114, 214, 0.24);
  }

  .search-row {
    flex-direction: column;
    gap: 10px;
  }

  .search-wrap input,
  .sort-sel {
    background: #ffffff;
    border: 1px solid rgba(70, 84, 104, 0.16);
    color: #1f2a37;
    min-height: 46px;
    border-radius: 12px;
    box-shadow: 0 4px 16px rgba(43, 52, 65, 0.05);
  }

  .search-wrap svg {
    color: #8b97a6;
    left: 12px;
  }

  .search-wrap input {
    padding-left: 34px;
    font-size: 16px;
  }

  .search-wrap input::placeholder {
    color: #8b97a6;
  }

  .search-wrap input:focus,
  .sort-sel:focus {
    border-color: #e39429;
    box-shadow: 0 0 0 3px rgba(227, 148, 41, 0.16);
  }

  .filter-row,
  #route-filters {
    gap: 8px;
  }

  .fchip {
    background: #ffffff;
    border: 1px solid rgba(70, 84, 104, 0.14);
    color: #516072;
    font-size: 12px;
    padding: 9px 13px;
    border-radius: 999px;
    box-shadow: 0 4px 14px rgba(43, 52, 65, 0.04);
  }

  .fchip.active {
    background: #fff0d6;
    border-color: rgba(189, 111, 0, 0.26);
    color: #bd6f00;
  }

  .result-line {
    color: #637082;
    font-size: 12px;
    text-align: right;
  }

  .result-line strong {
    color: #bd6f00;
  }

  :root { --card-w: 100%; }

  .cards-grid {
    grid-template-columns: 1fr;
    gap: 14px;
  }

  .card {
    background: rgba(255, 252, 247, 0.96);
    border: 1px solid rgba(70, 84, 104, 0.12);
    border-radius: 18px;
    box-shadow: 0 12px 28px rgba(43, 52, 65, 0.08);
  }

  .card::before {
    width: 6px;
  }

  .card-head {
    display: flex;
    flex-direction: column;
    background: linear-gradient(180deg, rgba(255,255,255,0.78), rgba(250,244,235,0.92));
    border-bottom-color: rgba(70, 84, 104, 0.1);
  }

  .card-head-top {
    padding: 10px 12px 8px;
    gap: 10px;
    border-bottom: 1px solid rgba(70, 84, 104, 0.08);
  }

  .run-day {
    font-size: 11px;
    letter-spacing: .06em;
  }

  .run-num {
    font-size: 22px;
    line-height: 1;
  }

  .btn-paddle {
    display: inline-flex;
    font-size: 10px;
    padding: 6px 8px;
    border-radius: 999px;
    border-color: rgba(70, 84, 104, 0.16);
    background: rgba(255,255,255,0.78);
    color: #516072;
  }

  .btn-paddle:hover {
    background: #fff0d6;
  }

  .card-head-bottom {
    justify-content: flex-start;
    padding: 8px 12px 10px;
  }

  .run-routes {
    font-size: 12px;
    color: #425164;
    white-space: normal;
    line-height: 1.4;
  }

  .stats-row {
    background: rgba(255,255,255,0.55);
    border-bottom-color: rgba(70, 84, 104, 0.08);
  }

  .stat {
    padding: 12px 8px;
    border-right-color: rgba(70, 84, 104, 0.08);
  }

  .stat-label {
    color: #7b8795;
    font-size: 10px;
  }

  .stat-val {
    color: #1d2a3a;
    font-size: 17px;
  }

  .stat-val.pay {
    color: #bd6f00;
  }

  .swing-section {
    background: #f7f1ff;
    border-top-color: rgba(116, 86, 199, 0.12);
    padding: 8px 12px;
    gap: 4px;
    font-size: 11px;
  }

  .swing-label {
    color: #726483;
  }

  .swing-value {
    color: #7a56c5;
  }

  .timeline {
    padding: 12px 12px 14px 14px;
  }

  .seg {
    margin-bottom: 10px;
  }

  .seg-connector {
    width: 18px;
    margin-right: 8px;
  }

  .seg-line {
    background: rgba(70, 84, 104, 0.16);
  }

  .seg-route {
    color: #1d2a3a;
    font-size: 14px;
  }

  .seg-block,
  .seg-sched,
  .seg-times {
    color: #607082;
  }

  .seg-time-tag {
    background: #e7f8ee;
    color: #1d8d54;
    padding: 2px 6px;
  }

  .empty {
    min-height: 220px;
    color: #667487;
    background: rgba(255,255,255,0.72);
    border: 1px solid rgba(70, 84, 104, 0.1);
    border-radius: 18px;
  }
}

@media (max-width: 480px) {
  header {
    padding: 12px 12px 10px;
  }

  .hd-depot {
    gap: 10px;
  }

  .hd-dot {
    width: 10px;
    height: 10px;
  }

  .day-selector {
    grid-template-columns: 1fr;
  }

  .day-btn {
    padding: 13px 12px;
    font-size: 13px;
  }

  .run-num {
    font-size: 20px;
  }

  .run-routes {
    font-size: 11px;
  }

  .seg-top {
    gap: 4px;
  }

  .seg-sched {
    width: 100%;
    margin-left: 0;
  }

  .btn-live {
    padding: 9px 12px;
    font-size: 11px;
  }
}
</style>
</head>
<body>

<header>
  <div class="hd-depot">
    <div class="hd-dot"></div>
    <div>
      <select class="hd-depot-select" id="district-select" onchange="changeDistrict()">
        <option value="">Loading districts...</option>
      </select>
      <div class="hd-pick">Spring 2026 A-Pick</div>
    </div>
  </div>
  <a href="https://deenersin-png.github.io/live-tracker/" class="btn-live">LIVE</a>
</header>

<div class="toolbar">
  <div class="day-selector" id="day-selector"></div>

  <div class="search-row">
    <div class="search-wrap">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="search-run" placeholder="Run #" maxlength="3" oninput="render()" inputmode="numeric">
    </div>

    <div class="search-wrap">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="search-block" placeholder="Block #" maxlength="4" oninput="render()" inputmode="numeric">
    </div>
  </div>

  <div class="filter-row" id="route-filters"></div>

  <select class="sort-sel" id="sort-sel" onchange="render()">
    <option value="run-asc">Run</option>
    <option value="pay-desc">Pay (Highest)</option>
    <option value="pay-asc">Pay (Lowest)</option>
    <option value="start-asc">Earliest Start</option>
    <option value="start-desc">Latest Start</option>
    <option value="finish-asc">Earliest Finish</option>
    <option value="finish-desc">Latest Finish</option>
    <option value="swing-desc">Swing (Longest)</option>
  </select>

  <div class="result-line"><strong id="res-n">0</strong> runs</div>
</div>

<div class="grid-wrap">
  <div class="cards-grid" id="grid"></div>
</div>

<script>
const isMobile = window.innerWidth <= 768;
const DAY_ORDER = ['Sunday', 'Weekday', 'Saturday'];

let STATE = {
  manifest: null,
  currentDistrict: null,
  currentDay: 'Weekday',
  activeRoutes: new Set(),
  runs: [],
  availableDays: [],
  pdfLinks: {}
};

function parseCSV(csvText) {
  const lines = csvText.trim().split('\n');
  if (lines.length < 2) return [];
  const headers = lines[0].split(',').map(h => h.trim().toLowerCase());
  return lines.slice(1)
    .filter(line => line.trim())
    .map(line => {
      const values = line.split(',').map(v => v.trim());
      const obj = {};
      headers.forEach((header, i) => { obj[header] = values[i] || ''; });
      return obj;
    });
}

function parseFullDateTime(dateTimeStr) {
  if (!dateTimeStr) return new Date(0);
  try {
    const parts = dateTimeStr.split(' ');
    const [year, month, day] = parts[0].split('-').map(Number);
    const [hours, minutes] = parts[1].split(':').map(Number);
    const ampm = parts[2];
    let hour = hours;
    if (ampm === 'AM' && hours === 12) hour = 0;
    if (ampm === 'PM' && hours !== 12) hour += 12;
    return new Date(year, month - 1, day, hour, minutes);
  } catch (e) { return new Date(0); }
}

function getRunRoutes(run) {
  const routes = [];
  for (let i = 1; i <= 10; i++) {
    const route = run['r' + i];
    if (route && route.trim()) routes.push(route.trim());
  }
  return routes;
}

async function loadManifest() {
  try {
    const response = await fetch('data/manifest.json');
    if (!response.ok) throw new Error('Manifest not found');
    STATE.manifest = await response.json();
    initializeDistricts();
  } catch (e) {
    document.getElementById('grid').innerHTML = `<div class="error">Error loading districts: ${e.message}</div>`;
  }
}

function initializeDistricts() {
  const select = document.getElementById('district-select');
  if (!STATE.manifest || !STATE.manifest.districts || STATE.manifest.districts.length === 0) {
    select.innerHTML = '<option>No districts available</option>';
    return;
  }
  select.innerHTML = STATE.manifest.districts
    .map(d => `<option value="${d.name}">${d.label || d.name}</option>`)
    .join('');
  if (STATE.manifest.districts.length > 0) {
    const saved = localStorage.getItem('paddleDepot');
    const validSaved = STATE.manifest.districts.find(d => d.name === saved);
    select.value = validSaved ? saved : STATE.manifest.districts[0].name;
    changeDistrict();
  }
}

async function changeDistrict() {
  const select = document.getElementById('district-select');
  STATE.currentDistrict = select.value;
  if (!STATE.currentDistrict) return;
  localStorage.setItem('paddleDepot', STATE.currentDistrict);

  try {
    STATE.runs = [];
    STATE.availableDays = [];
    STATE.pdfLinks = {};
    STATE.currentDay = 'Weekday';

    const districtConfig = STATE.manifest.districts.find(d => d.name === STATE.currentDistrict);
    if (!districtConfig || !districtConfig.days) throw new Error('District configuration not found');

    for (const day of districtConfig.days) {
      const dayLower = day.toLowerCase();
      try {
        const response = await fetch(`data/${STATE.currentDistrict}/${dayLower}.csv`);
        if (!response.ok) continue;
        const csvText = await response.text();
        const dayRuns = parseCSV(csvText);
        if (dayRuns.length > 0) {
          STATE.availableDays.push(day);
          dayRuns.forEach(run => { run.day = day; });
          STATE.runs.push(...dayRuns);
        }
      } catch (e) { console.log(`${day}.csv not found for ${STATE.currentDistrict}`); }
    }

    STATE.availableDays.sort((a, b) => DAY_ORDER.indexOf(a) - DAY_ORDER.indexOf(b));

    try {
      const response = await fetch(`data/${STATE.currentDistrict}/pdfs.csv`);
      if (response.ok) {
        const csvText = await response.text();
        const pdfData = parseCSV(csvText);
        pdfData.forEach(row => {
          const runno = row.runno || '';
          const day = row.day || '';
          if (runno && day) STATE.pdfLinks[day + '-' + runno] = { moblink: row.moblink || '', pclink: row.pclink || '' };
        });
      }
    } catch (e) { console.log('pdfs.csv not found'); }

    initializeDayButtons();
    render();
  } catch (e) {
    document.getElementById('grid').innerHTML = `<div class="error">Error loading district: ${e.message}</div>`;
  }
}

function initializeDayButtons() {
  const selectorContainer = document.getElementById('day-selector');
  const dayCounts = {};
  STATE.runs.forEach(r => { dayCounts[r.day] = (dayCounts[r.day] || 0) + 1; });

  let buttonsHtml = '';
  STATE.availableDays.forEach(day => {
    const count = dayCounts[day] || 0;
    const dayLower = day.toLowerCase();
    const isActive = STATE.currentDay === day ? 'active' : '';
    buttonsHtml += `<button class="day-btn ${dayLower} ${isActive}" onclick="changeDay('${day}')" title="${day}: ${count} runs">${day} (${count})</button>`;
  });

  selectorContainer.innerHTML = buttonsHtml;
  buildRouteChips();
}

function changeDay(day) {
  STATE.currentDay = day;
  STATE.activeRoutes.clear();
  document.querySelectorAll('.day-btn').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');
  buildRouteChips();
  render();
}

function buildRouteChips() {
  const routes = getRoutes(STATE.currentDay);
  const wrap = document.getElementById('route-filters');
  wrap.innerHTML = routes
    .map(r => `<button class="fchip${STATE.activeRoutes.has(r) ? ' active' : ''}" onclick="toggleRoute('${r}')">${r}</button>`)
    .join('');
}

function getRoutes(day) {
  const set = new Set();
  STATE.runs.forEach(r => {
    if (r.day !== day) return;
    const route = r.r1 || '';
    if (route && route.trim()) set.add(route.trim());
  });
  return [...set].sort();
}

function toggleRoute(r) {
  STATE.activeRoutes.has(r) ? STATE.activeRoutes.delete(r) : STATE.activeRoutes.add(r);
  buildRouteChips();
  render();
}

function render() {
  const searchRun = document.getElementById('search-run').value.trim();
  const searchBlock = document.getElementById('search-block').value.trim();
  const sort = document.getElementById('sort-sel').value;

  let filtered = STATE.runs.filter(r => {
    if (r.day !== STATE.currentDay) return false;
    if (searchRun && String(r.runno || '').trim() !== searchRun) return false;
    if (searchBlock && String(r.b1 || '').trim() !== searchBlock) return false;
    if (STATE.activeRoutes.size > 0) {
      const runRoutes = getRunRoutes(r);
      const allRoutesMatch = runRoutes.length > 0 && runRoutes.every(route => STATE.activeRoutes.has(route));
      if (!allRoutesMatch) return false;
    }
    return true;
  });

  const seenRuns = new Set();
  filtered = filtered.filter(r => {
    const runno = r.runno || '';
    if (seenRuns.has(runno)) return false;
    seenRuns.add(runno);
    return true;
  });

  const [sk, sd] = sort.split('-');
  filtered.sort((a, b) => {
    let av, bv;
    if (sk === 'run') { av = parseInt(a.runno) || 0; bv = parseInt(b.runno) || 0; return av - bv; }
    else if (sk === 'pay') { av = parseFloat(a.pay) || 0; bv = parseFloat(b.pay) || 0; }
    else if (sk === 'start') { av = parseFullDateTime(a.start).getTime(); bv = parseFullDateTime(b.start).getTime(); }
    else if (sk === 'finish') { av = parseFullDateTime(a.finish).getTime(); bv = parseFullDateTime(b.finish).getTime(); }
    else if (sk === 'swing') { av = parseInt(a.swingdursec) || 0; bv = parseInt(b.swingdursec) || 0; }
    return sd === 'asc' ? av - bv : bv - av;
  });

  document.getElementById('res-n').textContent = filtered.length;
  const grid = document.getElementById('grid');

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty"><p>No runs match your filters</p></div>';
    return;
  }

  grid.innerHTML = filtered.map(run => {
    const pdfLink = STATE.pdfLinks[run.day + '-' + run.runno] || {};
    const paddleLink = isMobile ? pdfLink.moblink : pdfLink.pclink;
    const paddleBtn = paddleLink
      ? `<a class="btn-paddle show" href="${paddleLink}" target="_blank">PADDLE ↗</a>`
      : '';

    const runRoutes = getRunRoutes(run);
    const uniqueRoutes = [...new Set(runRoutes)];
    const routesDisplay = uniqueRoutes.join(' | ');

    let segsHtml = '';
    for (let i = 1; i <= 10; i++) {
      const r = run['r' + i];
      const b = run['b' + i];
      if (!r || !b) break;
      segsHtml += `
        <div class="seg">
          <div class="seg-connector"><div class="seg-dot"></div><div class="seg-line"></div></div>
          <div class="seg-body">
            <div class="seg-top">
              <span class="seg-route">${r}</span>
              <span class="seg-block">${b}</span>
              <span class="seg-sched">${run['stime' + i] || ''}</span>
            </div>
            <div class="seg-times">
              <span class="seg-time-tag">${run['potype' + i] || ''}</span>
              <span>${run['pot' + i] || ''}</span>
              <span class="seg-arrow">→</span>
              <span class="seg-time-tag">${run['pitype' + i] || ''}</span>
              <span>${run['pit' + i] || ''}</span>
            </div>
          </div>
        </div>`;
    }

    const startTime = (run.start || '').split(' ').slice(1, 3).join(' ');
    const finishTime = (run.finish || '').split(' ').slice(1, 3).join(' ');

    let swingHtml = '';
    if (run.pullout2) {
      swingHtml = `<div class="swing-section"><div class="swing-label">Swing:</div><div class="swing-value">${run.swingdur || '—'}</div></div>`;
    }

    return `
      <div class="card day-${run.day}">
        <div class="card-head">
          <div class="card-head-top">
            ${pdfLink.pclink ? `<a class="run-num" href="${pdfLink.pclink}" target="_blank" style="text-decoration:none;">${run.runno}</a>` : `<div class="run-num">${run.runno}</div>`}
            <div class="run-day">${run.day}</div>
            <div class="run-actions">${paddleBtn}</div>
          </div>
          <div class="card-head-bottom">
            <div class="run-routes">${routesDisplay || '—'}</div>
          </div>
        </div>
        <div class="stats-row">
          <div class="stat"><div class="stat-label">Start</div><div class="stat-val">${startTime || '—'}</div></div>
          <div class="stat"><div class="stat-label">Finish</div><div class="stat-val">${finishTime || '—'}</div></div>
          <div class="stat"><div class="stat-label">Pay hrs</div><div class="stat-val pay">${run.pay || '—'}</div></div>
        </div>
        ${swingHtml}
        ${segsHtml ? `<div class="timeline">${segsHtml}</div>` : ''}
      </div>`;
  }).join('');
}

loadManifest();
</script>
</body>
</html>
